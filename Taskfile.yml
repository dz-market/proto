version: "3"

tasks:
    deps:
        desc: Update buf dependencies
        cmds:
            - buf dep update

    format:
        desc: Format proto files
        cmds:
            - buf format -w

    lint:
        desc: Run lint rules
        cmds:
            - buf lint

    swagger:normalize:
        desc: Drop per-file swaggers and rename service.swagger.json to <pkg>.<ver>.swagger.json
        internal: true
        cmds:
            - find gen/openapiv2 -type f -name '*.swagger.json' ! -name 'service.swagger.json' -delete
            - |
              for f in gen/openapiv2/*/*/service.swagger.json; do
                [ -e "$f" ] || continue
                dir=$(dirname "$f")
                ver=$(basename "$dir")
                pkg=$(basename "$(dirname "$dir")")
                mv "$f" "${dir}/${pkg}.${ver}.swagger.json"
              done

    gen:
        desc: Format, lint and regenerate all code
        cmds:
            - task: format
            - task: lint
            - buf generate
            - task: swagger:normalize
            - go mod tidy

    breaking:
        desc: Check for breaking changes against main
        cmds:
            - buf breaking --against '.git#branch=main'

    verify:
        desc: Ensure sources are formatted and generated code matches
        cmds:
            - buf format --diff --exit-code
            - buf generate
            - task: swagger:normalize
            - git add -A -N gen
            - git diff --exit-code -- gen go.mod go.sum

    release:
        desc: "Tag and push a release: task release v=X.Y.Z"
        requires:
            vars: [v]
        preconditions:
            - sh: test -z "$(git status --porcelain)"
              msg: Working tree is dirty - commit or stash first
        cmds:
            - task: lint
            - |
              last_tag=$(git describe --tags --abbrev=0 2>/dev/null || true)
              if [ -n "$last_tag" ]; then
                buf breaking --against ".git#tag=${last_tag}"
              else
                echo "No tags found - first release, skipping breaking check"
              fi
            - git tag "v{{.v}}"
            - git push origin "v{{.v}}"